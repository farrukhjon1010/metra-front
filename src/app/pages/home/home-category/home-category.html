@if (showPaidDialog()) {
  <app-paid-dialog></app-paid-dialog>
}

@if (!loader()) {
    <app-loading
      [texts]="['Загрузка...']">
    </app-loading>
}

@if (loader()) {
  <div class="category">
    @if (selectedScene()) {
      <app-home-header></app-home-header>
      <app-scenes-card
        [scene]="selectedScene()"
        (back)="goBack()">
      </app-scenes-card>
    }
  </div>
}
