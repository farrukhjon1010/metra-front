<div class="home__content">
  <div class="home__scenes-section">
    <div class="home__recommendations-section">
      <div class="home__section-header">
        <h2 class="home__section-title">Рекомендации дня</h2>
      </div>

      @for (row of rows(); track row) {
        <div class="home__recommendations-grid">
          @for (rec of row; track rec.id) {
            <div class="home__recommendation-btn" (click)="select(rec)">
              <img [src]="rec.image" alt="">
              <span class="home__rec-label">{{ rec.name }}</span>
            </div>
          }
        </div>
      }

    </div>
  </div>
</div>
